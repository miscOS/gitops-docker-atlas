http:
  # MIDDLEWARES
  middlewares:
    # Local IPs Allowlist
    local-ip-allow-list:
      plugin:
        ddns-allowlist:
          sourceRangeHosts:
            - ENC[AES256_GCM,data:J+HSMrirMnsFZkpIGH3S95vYl8mWzed3,iv:b2WBPkLLzYaS7c3Sx9flwOm+Sp/zSeugiwGvtxYqKIU=,tag:ypCOSJtCKpVL+o4ZhzGrMQ==,type:str]
          sourceRangeIps:
            - 127.0.0.1/32
            - 10.0.0.0/16
    # Error pages
    errorpages:
      errors:
        status:
          - 400-599
        service: errorpages@docker
        query: /{status}.html
  # ROUTERS
  routers:
    # TrueNAS
    truenas:
      rule: ENC[AES256_GCM,data:ZATXRH9vO+CJsj3JdUk2+3TqhvItK6wV8ILhYMG0JnLfB/lE6FPpvnFfF1JCrbww6YoZlb94EicB7g==,iv:jt1P2KX5IEM+Y9HG9yQxWIDa3lFKQJMfgr3v2Kxmn1E=,tag:q6tGET9e9ZlwFlgM0BMTLA==,type:str]
      entryPoints:
        - websecure
      middlewares:
        - local-ip-allow-list@file
      service: truenas@file
    # Proxmox
    proxmox:
      rule: ENC[AES256_GCM,data:x4xIwR+KizYrHqa1wE9C6YDsodhoDkZwna9HwrpAZEUX+RQpsUkzjWVIG/RZDUkQhCXz47HzkxK39g==,iv:eJBehA0CYgqWHiWNjIsMrH26kDzSHeVrmCY3znBTdZY=,tag:X8vaZOA6T2Pq0VWmm5NNuA==,type:str]
      entryPoints:
        - websecure
      middlewares:
        - local-ip-allow-list@file
      service: proxmox@file
  # SERVICES
  services:
    # TrueNAS
    truenas:
      loadBalancer:
        servers:
          - url: ENC[AES256_GCM,data:J8gXh9eG2o281CqBTn0YPstsaE6F,iv:FJIHaizxDursKltrgWh1QDI84eb87Z3qxSd+9I4nRt8=,tag:RXHakmPophy5ZbXRcN3pSw==,type:str]
        passHostHeader: true
    # Proxmox
    proxmox:
      loadBalancer:
        serversTransport: insecure
        servers:
          - url: ENC[AES256_GCM,data:VdjoarBywCJ+k/zxyHicL8wfKXhGdA==,iv:olXr2taiZU9rw8fDnOYUm78NTrBvj/feiCSnK7XMvKY=,tag:A2uSwpnp+AW24BmgdoN6MQ==,type:str]
  # SERVERS TRANSPORTS
  serversTransports:
    # Allow self signed certificates
    insecure:
      insecureSkipVerify: true
