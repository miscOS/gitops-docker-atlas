http:
  # MIDDLEWARES
  middlewares:
    # Local IPs Allowlist
    local-ip-allow-list:
      plugin:
        ddns-allowlist:
          sourceRangeHosts:
            - ENC[AES256_GCM,data:tbQHYNhhpPerBpLN22uP/7aDzfpc2MXd,iv:klv+codI5CQyWh6+EDrVGXaOFkvgGVGwhSJvV4TrtqA=,tag:4nB7hKNBK0xkO58gdUAVqQ==,type:str]
          sourceRangeIps:
            - 127.0.0.1/32
            - 10.0.0.0/16
    # Error pages
    errorpages:
      errors:
        status:
          - 400-599
        service: errorpages@docker
        query: /{status}.html
  # ROUTERS
  routers:
    # TrueNAS
    truenas:
      rule: ENC[AES256_GCM,data:H8CDTKkW7WoVKgnf53kqejocrxAnRjP1k25RHbop3HxTjaEiVWyxqJF6Nx/FyqNEBW14g/97cOZWKw==,iv:rbssDuTs8I+99q5iA+phQqhD0/bjfk+0/WRG/44dO8o=,tag:XBYTUB8zY+9/hPh8BIO2VQ==,type:str]
      entryPoints:
        - websecure
      middlewares:
        - local-ip-allow-list@file
      service: truenas@file
    # Proxmox
    proxmox:
      rule: ENC[AES256_GCM,data:V67rQUjqjZHzr9aZ6xn2dZNGask18v05Pf7xtqpVLWdj/fhsoiRvmbckGqJfdDsEkX0C9eMUY2RQYw==,iv:SXdr7nia2m14cHB2mji16OUUQP+Ldi3MgzQvBa5VmIY=,tag:EofyRnl3M55qnYGXRGzApA==,type:str]
      entryPoints:
        - websecure
      middlewares:
        - local-ip-allow-list@file
      service: proxmox@file
  # SERVICES
  services:
    # TrueNAS
    truenas:
      loadBalancer:
        servers:
          - url: ENC[AES256_GCM,data:BegsYXjNO69aB9WHIdu7WjHGqajX,iv:ThWLyEVC9yHrIUWDhtTQLBoYb+ltrAEuHbRryr+PXSs=,tag:NT0ZzJ+2dqr9s5NWZWvCDw==,type:str]
        passHostHeader: true
    # Proxmox
    proxmox:
      loadBalancer:
        serversTransport: insecure
        servers:
          - url: ENC[AES256_GCM,data:tJUkjYNMWlO2wl4cq1sM61Th14nUig==,iv:hEsy5pA5mahvDZt/plB/Yq2Rgwv8gfG0yvZ2giEinUY=,tag:ifdWzmbKgE//355X0tAUFw==,type:str]
  # SERVERS TRANSPORTS
  serversTransports:
    # Allow self signed certificates
    insecure:
      insecureSkipVerify: true
