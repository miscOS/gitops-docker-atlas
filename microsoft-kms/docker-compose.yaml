name: microsoft-kms

networks:
  lan:
    name: macvlan
    external: true

services:
  vlmcsd:
    image: ghcr.io/miscos/vlmcsd-docker:latest
    container_name: KMSEmulator
    networks:
      lan:
        ipv4_address: 10.0.100.150
        mac_address: 10:01:00:01:05:00
    restart: unless-stopped
    labels:
      backrest.keep-alive: true